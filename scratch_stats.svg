            font-weight: 600;
            alignment-baseline: middle;
            text-anchor: middle;
        }

        .icon {
            fill: #FF0000;
            display: block;
        }


        @keyframes fade {
            from {
                opacity: .5;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fadeH {
            from {
                opacity: 0;
                transform: translate(-90px, 10px);
            }

            to {
                opacity: 1;
                transform: translate(10px, 10px);
            }
        }
